services:
  vigil:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vigil
    restart: unless-stopped
    ports:
      - "8010:5000"
    env_file: .env
    volumes:
      - ./vigil-data:/app/data_volume
      - ./vigil-backups:/app/backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
